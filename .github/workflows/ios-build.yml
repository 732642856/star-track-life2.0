name: Build iOS Release

on:
  workflow_dispatch:  # 手动触发
    inputs:
      version:
        description: '版本号 (如 1.0.0)'
        required: false
        default: '1.0.0'

jobs:
  build:
    name: Build iOS IPA
    runs-on: macos-15  # GitHub 提供的 macOS runner，自带 Xcode
    timeout-minutes: 60

    steps:
      # ===== 1. 拉取代码 =====
      - name: Checkout repository
        uses: actions/checkout@v4

      # ===== 2. 安装 Node.js =====
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # ===== 3. 安装依赖 =====
      - name: Install npm dependencies
        run: npm install

      # ===== 4. 同步 Capacitor iOS 项目 =====
      - name: Sync Capacitor iOS
        run: npx cap sync ios

      # ===== 5. 导入签名证书 =====
      - name: Import Distribution Certificate
        env:
          P12_BASE64: ${{ secrets.P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
        run: |
          # 将 base64 编码的 .p12 文件解码
          echo "$P12_BASE64" | base64 --decode > /tmp/distribution.p12
          
          # 创建临时 keychain 用于导入证书
          security create-keychain -p "$P12_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$P12_PASSWORD" build.keychain
          
          # 导入证书到 keychain
          security import /tmp/distribution.p12 \
            -k build.keychain \
            -P "$P12_PASSWORD" \
            -T /usr/bin/codesign
          
          # 设置分区列表，允许 codesign 使用私钥
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s -k "$P12_PASSWORD" build.keychain
          
          # 清理临时文件
          rm /tmp/distribution.p12
          
          echo "✅ 证书导入成功"

      # ===== 6. 导入 Provisioning Profile =====
      - name: Install Provisioning Profile
        env:
          PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
        run: |
          # 解码并安装 Provisioning Profile
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$PROVISIONING_PROFILE_BASE64" | base64 --decode > \
            ~/Library/MobileDevice/Provisioning\ Profiles/star-track-life.mobileprovision
          
          echo "✅ Provisioning Profile 安装成功"

      # ===== 7. 设置版本号（可选） =====
      - name: Set Version Number
        if: ${{ github.event.inputs.version != '' }}
        working-directory: ios/App/App
        run: |
          /usr/libexec/PlistBuddy -c \
            "Set :CFBundleShortVersionString ${{ github.event.inputs.version }}" \
            Info.plist
          echo "✅ 版本号设置为 ${{ github.event.inputs.version }}"

      # ===== 8. 构建 .xcarchive =====
      - name: Build Archive
        working-directory: ios/App
        env:
          DEVELOPER_DIR: /Applications/Xcode_16.app/Contents/Developer
        run: |
          # 先列出可用的 Xcode 版本
          ls /Applications/ | grep Xcode
          
          xcodebuild archive \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath ./build/App.xcarchive \
            -destination 'generic/platform=iOS' \
            -allowProvisioningUpdates \
            CODE_SIGN_STYLE=Manual \
            PROVISIONING_PROFILE_SPECIFIER="" \
            DEVELOPMENT_TEAM="" \
            | xcpretty --color && exit ${PIPESTATUS[0]}
          
          echo "✅ Archive 构建成功"

      # ===== 9. 导出 IPA =====
      - name: Export IPA
        working-directory: ios/App
        run: |
          # 创建导出选项 plist
          cat > ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store</string>
              <key>teamID</key>
              <string>${{ secrets.TEAM_ID }}</string>
              <key>uploadBitcode</key>
              <false/>
              <key>uploadSymbols</key>
              <true/>
          </dict>
          </plist>
          EOF
          
          xcodebuild -exportArchive \
            -archivePath ./build/App.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath ./build/ipa \
            | xcpretty --color && exit ${PIPESTATUS[0]}
          
          echo "✅ IPA 导出成功"
          
          # 显示 IPA 文件信息
          ls -lh ./build/ipa/

      # ===== 10. 上传 IPA 为 Artifact（方便下载） =====
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: StarTrackLife-IPA
          path: ios/App/build/ipa/*.ipa
          retention-days: 30

      # ===== 11. （可选）直接上传到 App Store Connect =====
      - name: Upload to App Store Connect
        if: ${{ secrets.APPLE_ID != '' }}
        working-directory: ios/App
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APP_SPECIFIC_PASSWORD: ${{ secrets.APP_SPECIFIC_PASSWORD }}
        run: |
          xcrun altool --upload-app \
            --type ios \
            --file ./build/ipa/*.ipa \
            --username "$APPLE_ID" \
            --password "$APP_SPECIFIC_PASSWORD" \
            || echo "⚠️ App Store 上传失败，请手动通过 Transporter 上传 IPA"
